services:

  python:
    image: ${DOCKER_CONTAINER_NAME_PREFIX}-python
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}-python
    build: ./python
    healthcheck:
      test: "netstat -tulpn | grep :8000"
      timeout: 45s
      interval: 2s
      retries: 20
    volumes:
      - ../server:/server
    env_file:
      - ./.env
    ports:
      - ${SERVER_PORT_PUBLIC}:8000
    working_dir: /server
    command: python main.py
    depends_on:
      - redis

  redis:
    image: redis:alpine
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 45s
      interval: 2s
      retries: 20

  nginx:
    image: nginx:alpine
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}-nginx
    volumes:
      - ../app/dist:/usr/share/nginx/html
      - ./nginx/conf.d/app.conf:/etc/nginx/conf.d/default.conf
    ports:
      - ${NGINX_PORT_PUBLIC}:80
