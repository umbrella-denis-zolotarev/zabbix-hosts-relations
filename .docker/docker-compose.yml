services:

  python:
    image: ${DOCKER_CONTAINER_NAME_PREFIX}-python
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}-python
    build: ./python
    healthcheck:
      test: "netstat -tulpn | grep :8000"
      timeout: 45s
      interval: 2s
      retries: 20
    volumes:
      - ../server:/server
    env_file:
      - ./.env
    #ports:
    #  - ${SERVER_PORT_PUBLIC}:8000
    working_dir: /server
    command: python main.py
    depends_on:
      - redis

  redis:
    image: redis:alpine
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 45s
      interval: 2s
      retries: 20

  nginx:
    image: nginx:alpine
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}-nginx
    volumes:
      - ../app/dist:/usr/share/nginx/html
      - ./nginx/conf.d/app.conf:/etc/nginx/conf.d/default.conf
    env_file:
      - ./.env
    ports:
      - ${NGINX_PORT_PUBLIC}:80
    depends_on:
      - python
    # When BASIC_AUTH_ENABLE is on, generate the .htpasswd file and the
    # auth_basic include from the env credentials; otherwise leave the include
    # empty so nginx serves without auth. Then start nginx.
    command:
      - /bin/sh
      - -c
      - |
        if [ "$$BASIC_AUTH_ENABLE" = "1" ] || [ "$$BASIC_AUTH_ENABLE" = "true" ]; then
          printf '%s:{PLAIN}%s\n' "$$BASIC_AUTH_LOGIN" "$$BASIC_AUTH_PASSWORD" > /etc/nginx/.htpasswd
          printf 'auth_basic "Restricted";\nauth_basic_user_file /etc/nginx/.htpasswd;\n' > /etc/nginx/auth_basic.conf
        else
          : > /etc/nginx/auth_basic.conf
        fi
        exec nginx -g 'daemon off;'
