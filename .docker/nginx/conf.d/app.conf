server {
    listen 80;

    # HTTP basic auth, toggled by BASIC_AUTH_ENABLE. This file is generated at
    # container startup (see docker-compose.yml): it holds the auth_basic
    # directives when enabled, and is empty otherwise.
    include /etc/nginx/auth_basic.conf;

    location / {
        root /usr/share/nginx/html;
        try_files /$uri /$uri /index.html$is_args$args;
    }

    location = /api {
        return 301 /api/;
    }

    location /api/ {
        proxy_pass http://python:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
